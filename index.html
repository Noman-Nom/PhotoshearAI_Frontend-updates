<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise Auth Portal</title>
    <!-- Font Imports: Poppins (Geometric/Rounded) and Inter (Neutral/Readable) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Poppins', 'sans-serif'],
              display: ['Poppins', 'sans-serif'],
            },
            letterSpacing: {
              'tightest': '-0.04em',
              'modern': '-0.01em',
            }
          },
        },
      }
    </script>
    <style type="text/css">
      /* Universal Typography Overrides */
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: #0F172A;
      }

      /* Primary Font: Headings & Names - Rounded, friendly, geometric */
      h1, h2, h3, .text-3xl, .text-2xl, .font-black {
        font-family: 'Poppins', sans-serif !important;
        font-weight: 700 !important;
        letter-spacing: -0.02em !important;
        line-height: 1.2 !important;
        text-transform: none !important; /* Moving away from forced uppercase for a friendlier look */
      }

      /* Secondary Font: Labels & Stats - Neutral, readable */
      label, 
      .text-xs.font-bold, 
      .text-\[11px\].font-bold,
      .text-\[10px\].font-bold,
      .status-badge {
        font-family: 'Inter', sans-serif !important;
        font-weight: 600 !important;
        letter-spacing: 0.01em !important;
        text-transform: uppercase !important;
        opacity: 0.8;
      }

      /* Numeric / UI Data: Clean, semi-rounded sans-serif */
      .font-mono,
      [class*="text-"][class*="font-black"],
      .numeric-data {
        font-family: 'Inter', sans-serif !important;
        font-feature-settings: "tnum", "lnum" !important; /* Tabular & Lining figures for perfect alignment */
        letter-spacing: -0.02em !important;
      }

      /* Refined UI Text */
      .text-sm {
        line-height: 1.5 !important;
      }

      /* Button Typography */
      button, .btn {
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      /* Responsive utility overrides */
      .tracking-widest {
        letter-spacing: 0.1em !important;
      }
      
      .tracking-tighter {
        letter-spacing: -0.04em !important;
      }

      /* Custom Scrollbar for a premium look */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #F8FAFC;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #CBD5E1;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #94A3B8;
      }

      /* ============================================
         SMOOTH DATA UPDATE TRANSITIONS
         ============================================ */
      
      /* Skeleton shimmer animation */
      @keyframes skeleton-shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
      
      .skeleton-shimmer {
        background: linear-gradient(
          90deg,
          #e2e8f0 0%,
          #f1f5f9 50%,
          #e2e8f0 100%
        );
        background-size: 200% 100%;
        animation: skeleton-shimmer 1.5s ease-in-out infinite;
      }
      
      /* Smooth list item transitions */
      .list-item-transition {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      .list-item-transition:hover {
        transform: translateY(-1px);
      }
      
      /* Fade in/out for data updates */
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes fade-out-down {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(8px);
        }
      }
      
      .animate-fade-in-up {
        animation: fade-in-up 0.3s ease-out forwards;
      }
      
      .animate-fade-out-down {
        animation: fade-out-down 0.2s ease-in forwards;
      }
      
      /* Loading overlay */
      .loading-overlay {
        position: relative;
      }
      
      .loading-overlay::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(2px);
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }
      
      .loading-overlay.is-loading::after {
        opacity: 1;
        visibility: visible;
      }
      
      /* Smooth table row transitions */
      tbody tr {
        transition: background-color 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
      }
      
      /* Optimistic update highlight */
      .optimistic-update {
        animation: optimistic-pulse 0.6s ease-out;
      }
      
      @keyframes optimistic-pulse {
        0% {
          background-color: rgba(59, 130, 246, 0.1);
        }
        100% {
          background-color: transparent;
        }
      }
      
      /* Card loading state */
      .card-loading {
        opacity: 0.6;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }
      
      /* Spinner animation */
      @keyframes spin-slow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      
      .animate-spin-slow {
        animation: spin-slow 1.5s linear infinite;
      }

      /* Success flash animation */
      @keyframes success-flash {
        0%, 100% {
          background-color: transparent;
        }
        50% {
          background-color: rgba(16, 185, 129, 0.1);
        }
      }
      
      .animate-success-flash {
        animation: success-flash 0.8s ease-out;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.560.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@^3.4.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.1/",
    "react/": "https://esm.sh/react@^19.2.1/",
    "react": "https://esm.sh/react@^19.2.1",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.10.1",
    "clsx": "https://esm.sh/clsx@^2.1.1",
    "zod": "https://esm.sh/zod@^4.1.13",
    "react-hook-form": "https://esm.sh/react-hook-form@^7.68.0",
    "@hookform/resolvers/": "https://esm.sh/@hookform/resolvers@^5.2.2/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
